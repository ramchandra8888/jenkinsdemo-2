<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Pipeline Dashboard</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --text-color: #e2e8f0;
            --success: #2ec4b6;
            --building: #3a86ff;
            --failed: #e63946;
            --skipped: #8d99ae;
            --border-color: #3f3f50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pipeline-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 1000px;
        }

        .pipeline-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .pipeline-header h2 {
            margin: 0 0 5px 0;
            color: #ffffff;
        }

        .pipeline-meta {
            font-size: 14px;
            color: #94a3b8;
        }

        .pipeline-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow-x: auto;
            padding: 20px 0;
        }

        /* Connecting line between stages */
        .pipeline-flow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 4px;
            background-color: var(--border-color);
            z-index: 1;
            transform: translateY(-50%);
        }

        .stage {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            width: 140px;
            text-align: center;
            position: relative;
            z-index: 2;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stage:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .stage-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .stage-status {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .stage-time {
            font-size: 11px;
            color: #94a3b8;
            margin-top: 8px;
        }

        /* Status Modifiers */
        .status-success { border-color: var(--success); }
        .status-success .stage-status { background-color: rgba(46, 196, 182, 0.2); color: var(--success); }

        .status-building { border-color: var(--building); animation: pulse 2s infinite; }
        .status-building .stage-status { background-color: rgba(58, 134, 255, 0.2); color: var(--building); }

        .status-failed { border-color: var(--failed); }
        .status-failed .stage-status { background-color: rgba(230, 57, 70, 0.2); color: var(--failed); }

        .status-skipped { border-color: var(--skipped); opacity: 0.6; }
        .status-skipped .stage-status { background-color: rgba(141, 153, 174, 0.2); color: var(--skipped); }

        /* Progress animation for building stage */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(58, 134, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(58, 134, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(58, 134, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="pipeline-container">
        <div class="pipeline-header">
            <h2>production-deployment-pipeline #42</h2>
            <div class="pipeline-meta">
                Started by user <strong>DevOps_Admin</strong> &bull; Commit: <code style="color: #f1faee;">a1b2c3d</code> &bull; Duration: 4m 32s
            </div>
        </div>

        <div class="pipeline-flow">
            <div class="stage status-success">
                <div class="stage-name">Checkout</div>
                <div class="stage-status">Success</div>
                <div class="stage-time">12s</div>
            </div>

            <div class="stage status-success">
                <div class="stage-name">Code Lint & Test</div>
                <div class="stage-status">Success</div>
                <div class="stage-time">1m 45s</div>
            </div>

            <div class="stage status-success">
                <div class="stage-name">Build Image</div>
                <div class="stage-status">Success</div>
                <div class="stage-time">2m 10s</div>
            </div>

            <div class="stage status-building">
                <div class="stage-name">Staging Deploy</div>
                <div class="stage-status">Building</div>
                <div class="stage-time">25s...</div>
            </div>

            <div class="stage status-skipped">
                <div class="stage-name">Prod Deploy</div>
                <div class="stage-status">Pending</div>
                <div class="stage-time">--</div>
            </div>
        </div>
    </div>

</body>
</html>
