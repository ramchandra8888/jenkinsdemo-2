<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenkins Pipeline Dashboard</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --card-bg: #2a2a35;
            --text-color: #e2e8f0;
            --success: #2ec4b6;
            --building: #3a86ff;
            --failed: #e63946;
            --skipped: #8d99ae;
            --border-color: #3f3f50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pipeline-container {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 1000px;
        }

        .pipeline-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 30px;
        }

        .pipeline-header h2 {
            margin: 0 0 5px 0;
            color: #ffffff;
        }

        .pipeline-meta {
            font-size: 14px;
            color: #94a3b8;
        }

        .pipeline-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow-x: auto;
            padding: 20px 0;
        }

        /* Connecting line between stages */
        .pipeline-flow::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 5%;
            right: 5%;
            height: 4px;
            background-color: var(--border-color);
            z-index: 1;
            transform: translateY(-50%);
        }

        .stage {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            width: 140px;
            text-align: center;
            position: relative;
            z-index: 2;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stage:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .stage-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
